# Dependabot version updates. Pairs with Dependabot alerts + security updates
# (already active on this repo) for the dependency-vuln half. The npm ecosystem
# covers the pnpm workspace; weekly cadence + grouping keeps PR volume manageable.
#
# Note std-24: shared libraries are single-versioned across the workspace via
# pnpm.overrides in the root package.json — when a grouped bump touches one of
# those families (vitest, @vitest/coverage-v8, @types/node), the override must be
# updated too or the bump won't take effect. Review those PRs with that in mind.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch routine minor/patch bumps into one PR to cut review churn;
      # security updates still arrive individually + promptly.
      npm-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Deferred breaking migrations — each owned by a Spec, so dependabot must
      # not re-propose them (a plain bump fails CI and churns the merge gate).
      # Remove the matching ignore when its Spec lands, to resume normal bumps.
      - dependency-name: "tailwindcss" # spec-290 owns the v3 → v4 migration
        update-types: ["version-update:semver-major"]
      - dependency-name: "web-tree-sitter" # spec-292 owns the 0.25 → 0.26 ABI migration
        # 0.x: dependabot classifies 0.25 → 0.26 as "minor" (which is why it slipped
        # into npm-minor-and-patch), so ignore minor + major to keep it out until 292.
        update-types:
          ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
