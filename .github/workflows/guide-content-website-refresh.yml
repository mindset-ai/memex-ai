# spec-222 t-13 (dec-7) — cross-repo corpus refresh.
#
# When the memex-website repo deploys new content (its CI fires a GitHub
# `repository_dispatch` of type `website-content-changed` into THIS repo), refresh
# the memex-ai `guide_content` Postgres corpus for surface=memex-website from the
# website's published llms-full.txt — WITHOUT waiting for a memex-ai deploy.
#
# This trigger is PRIVILEGED + AUTHENTICATED (Workload Identity Federation + the
# Cloud SQL proxy, exactly like deploy.yml per std-26) — it is NEVER the public
# anonymous /guide/v1 endpoint (dec-4). The import is BOUNDED (`timeout`) +
# NON-GATING (`|| echo`) + IDEMPOTENT (upsert skips unchanged content_hash, prunes
# stale website-surface chunks), so a re-trigger or a hiccup is always safe.
#
# Option A (memex-ai-deploy-only re-import) remains the implicit fallback: the
# existing deploy.sh step still re-imports on every memex-ai deploy.

name: guide-content website refresh

on:
  # Fired by the memex-website repo's deploy CI (privileged cross-repo dispatch).
  repository_dispatch:
    types: [website-content-changed]
  # Manual re-trigger (always safe — idempotent).
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        type: choice
        options: [prod, int]
        default: prod

concurrency:
  group: guide-content-website-refresh-${{ github.event.client_payload.env || inputs.env || 'prod' }}
  cancel-in-progress: false

# Without id-token: write the WIF auth step CANNOT mint an OIDC token and the
# job fails at "Authenticate to GCP" (found 2026-06-11 by spec-251's first live
# dispatch — this workflow had never actually run since spec-222 t-13 shipped it).
permissions:
  contents: read
  id-token: write # OIDC token for Workload Identity Federation

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Picks the per-environment DEPLOY_ENV_FILE secret (DB coordinates), exactly
    # like deploy.yml. prod → memex.ai, int → int.memex.ai.
    environment:
      name: ${{ github.event.client_payload.env || inputs.env || 'prod' }}
    env:
      ENV: ${{ github.event.client_payload.env || inputs.env || 'prod' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install cloud-sql-proxy
        run: |
          curl -fsSL -o /usr/local/bin/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64
          chmod +x /usr/local/bin/cloud-sql-proxy

      - name: Write per-env deploy config
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          if [ -z "$DEPLOY_ENV_FILE" ]; then
            echo "::error::DEPLOY_ENV_FILE secret is not set on the '${ENV}' environment"
            exit 1
          fi
          printf '%s\n' "$DEPLOY_ENV_FILE" > "scripts/deploy.${ENV}.env"

      - name: Refresh website corpus (surface=memex-website)
        # Mirrors deploy.sh's proxy + DB_URL construction (PROXY_PORT=15432), then
        # runs the spec-222 t-8 website-surface import against the published
        # llms-full.txt. Bounded + non-gating: a timeout (124) or any error is
        # swallowed so a hiccup never wedges the refresh — the next trigger resumes.
        run: |
          set -a; . "scripts/deploy.${ENV}.env"; set +a
          # CLOUD_SQL_INSTANCE_CONN is a DERIVED value — scripts/deploy-config.sh
          # composes it from these three parts; it is NOT a key in the deploy env
          # body, so we must compose it here. Omitting this left it empty and the
          # proxy failed with `connection name = ""`, which the non-gating import
          # below swallowed into a false green (found 2026-06-12 via the spec-251
          # sibling — this clone shared the defect; spec-222 t-13's path had in
          # fact never ingested).
          if [ -z "${GCP_PROJECT}" ] || [ -z "${REGION}" ] || [ -z "${CLOUD_SQL_INSTANCE_NAME}" ]; then
            echo "::error::deploy env is missing GCP_PROJECT/REGION/CLOUD_SQL_INSTANCE_NAME — cannot reach the DB"
            exit 1
          fi
          CLOUD_SQL_INSTANCE_CONN="${GCP_PROJECT}:${REGION}:${CLOUD_SQL_INSTANCE_NAME}"
          PROXY_PORT=15432
          cloud-sql-proxy "${CLOUD_SQL_INSTANCE_CONN}" --port ${PROXY_PORT} &
          PROXY_PID=$!
          # An unreachable DB is an INFRA failure and must fail LOUDLY (exit 1),
          # unlike a content/network hiccup in the import below (deliberately
          # non-gating). Wait for the proxy to actually accept connections; without
          # this gate an unreachable DB rides the `|| echo` to a false green.
          if ! timeout 30 bash -c "until (echo > /dev/tcp/localhost/${PROXY_PORT}) 2>/dev/null; do sleep 1; done"; then
            echo "::error::cloud-sql-proxy never became reachable on localhost:${PROXY_PORT} (instance=${CLOUD_SQL_INSTANCE_CONN}) — DB unreachable, refusing to report success"
            kill $PROXY_PID 2>/dev/null || true
            exit 1
          fi
          DB_PASS_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "${DB_PASS}")
          DB_URL="postgresql://${DB_USER}:${DB_PASS_ENC}@localhost:${PROXY_PORT}/${DB_NAME}"
          if [ "${ENV}" = "prod" ]; then SRC="https://memex.ai/llms-full.txt"; else SRC="https://int.memex.ai/llms-full.txt"; fi
          DATABASE_URL="${DB_URL}" timeout 600 \
            pnpm --filter @memex/server exec tsx scripts/import-guide-content.ts \
              --surface=memex-website --source="${SRC}" \
            || echo "⚠ website corpus refresh timed out or failed (non-gating, exit $?) — safe to re-trigger (idempotent)."
          kill $PROXY_PID 2>/dev/null || true
