name: test

# Branch-bound CI per std-21: `develop` is the integration line that must be
# green before it fast-forwards into `main` (the release line). Gate both —
# develop on every push/PR (where work actually lands), main on the release
# fast-forward and any PR targeting it.
#
# Jobs run in PARALLEL — wall-clock is the slowest job, not the sum:
#   server  full server suite under coverage. One vitest run subsumes the old
#           unit/integration/security/regression steps (they were subsets of
#           the same include) AND the coverage gate that used to re-run
#           everything a second time.
#   ui      React UI unit tests + coverage gate (jsdom, no database).
#   cli     memex-ai installer tests (zero-dep, no database).
#   e2e     Playwright journeys against a freshly migrated DB. Deliberately
#           NOT `needs: server` — it boots its own stack, and serializing it
#           behind the server job doubled the wall-clock for no extra signal.
#   perf    nightly/manual only (see below) — not part of the PR gate.
#
# All four PR-gating jobs are required checks on develop + main.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Nightly perf run (see `perf` job below). Also triggerable manually from the Actions
  # tab via workflow_dispatch when investigating concurrency regressions.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# One workflow run per ref. If a push lands while a prior run is still going, the older
# run is cancelled — saves CI minutes and avoids merge-queue thrash.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full server suite (unit + integration + security + regression + api), SHARDED
  # across 3 runners (spec-276). The single un-sharded job was the merge-gate long
  # pole (~6m17s; ~72% of it module-import under v8 coverage instrumentation, and
  # core-starved at ~2 workers on a 2-core runner). Three shards each run ~1/3 of
  # the files, so import + test time divide → ~2.5min, and total CI drops to ~3min
  # (now gated by ui/e2e). The t-17 coverage gate is NOT weakened: it moves intact
  # to the `server-result` merge job below, which enforces 80/80/70/80 on the
  # MERGED full-suite coverage. Mirrors the e2e matrix + e2e-result aggregator.
  #
  # WHY the shard step forces every coverage threshold to 0: in vitest 4.1.1 the
  # blob reporter does NOT defer threshold evaluation (verified empirically,
  # spec-276 — confirmed in @vitest/coverage-v8 generateReports→reportThresholds).
  # A shard running --coverage with the config thresholds live would run
  # checkThresholds against its OWN partial ~1/3 coverage and exit 1. So shards are
  # collect-only (thresholds 0); the merge job is the SOLE place the real gate fires.
  server:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres side-car. Same major version we run locally (schema.ts uses features
    # introduced in 13+; production is Cloud SQL 16). Health check blocks `steps` from
    # starting until the server is ready. Each shard gets its OWN service, so the
    # per-worker DB clones (vitest.worker-db.setup.ts) never collide across shards.
    services:
      postgres:
        # pgvector-bundled Postgres 16 — migration 0023 (codebase intelligence)
        # runs CREATE EXTENSION vector, absent from the stock postgres image.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memex
      # spec-129: authenticate AC-emission to the prod Memex. Value lives in the
      # MEMEX_EMIT_KEY repo secret (Settings → Secrets and variables → Actions),
      # never in this file; empty until set (harmless pre-enforcement), and what
      # greens the spec-129 ac-5 gate once configured.
      MEMEX_EMIT_KEY: ${{ secrets.MEMEX_EMIT_KEY }}

    steps:
      - uses: actions/checkout@v6

      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # the root package.json `packageManager` field and errors if both are set.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        # Drizzle-kit journal covers 0000-0008; 0009+ are hand-written and applied
        # directly so the journal doesn't try to re-run them. Piping each file in order
        # mirrors what the local dev environment does (see `rake db:nuke`).
        run: |
          for f in packages/server/drizzle/*.sql; do
            echo "Applying $f"
            psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"
          done

      - name: Server suite shard ${{ matrix.shard }}/3 (collect coverage, NO threshold gate)
        # --reporter=blob writes packages/server/.vitest-reports/blob-<shard>-3.json.
        # --reporter=default ALSO prints the pass/fail test tree to the console:
        # blob alone suppresses the console reporter, so a red shard would name no failing
        # test in the logs — undiagnosable. The dual reporter restores that (the blob is
        # still written for the merge; verified the two coexist). Do NOT drop the second
        # reporter — spec-276 issue-2: the first develop flake was un-diagnosable from logs
        # and only recovered by downloading + replaying the shard blob artifact.
        # The four --coverage.thresholds.*=0 flags make this shard collect-only — the
        # gate is enforced once, on merged coverage, in server-result (see header).
        run: |
          pnpm --filter @memex/server exec vitest run \
            --shard=${{ matrix.shard }}/3 \
            --coverage --reporter=blob --reporter=default \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0

      - name: Upload coverage blob (shard ${{ matrix.shard }})
        # Always upload so server-result can merge; a missing blob fails that job closed.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage-blob-${{ matrix.shard }}
          path: packages/server/.vitest-reports/
          # REQUIRED: vitest writes the blob to `.vitest-reports/` (a dot-dir), and
          # upload-artifact@v4 excludes hidden files by default — without this the
          # upload silently finds nothing and server-result fails closed on 0 blobs.
          include-hidden-files: true
          retention-days: 14

  # Merge the 3 shard coverage blobs and enforce the t-17 thresholds on the MERGED
  # full-suite coverage (spec-276 dec-2). This job's name is the STABLE required
  # check for branch protection — the matrix leg names ("server (1)" …) shift with
  # the shard count and must NOT be required directly (the e2e-result precedent).
  # Fail-closed: a cancelled/failed shard (needs.server.result != success) or a
  # missing blob fails the gate rather than passing on partial coverage.
  server-result:
    needs: [server]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MEMEX_EMIT_KEY: ${{ secrets.MEMEX_EMIT_KEY }}

    steps:
      # Fail closed FIRST: if any shard was cancelled or failed, never merge — a
      # partial shard set must not produce a green coverage gate.
      - name: Fail if any server shard did not succeed
        if: needs.server.result != 'success'
        run: |
          echo "server shards result: ${{ needs.server.result }}"
          exit 1

      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Download all shard coverage blobs
        uses: actions/download-artifact@v4
        with:
          pattern: server-coverage-blob-*
          path: /tmp/server-blobs
          merge-multiple: true

      - name: Stage blobs and fail closed on a missing shard
        # vitest --merge-reports reads .vitest-reports/ relative to CWD (= the server
        # package under the pnpm filter), so stage the downloaded blobs there.
        run: |
          mkdir -p packages/server/.vitest-reports
          cp /tmp/server-blobs/*.json packages/server/.vitest-reports/ 2>/dev/null || true
          count=$(ls packages/server/.vitest-reports/blob-*.json 2>/dev/null | wc -l)
          echo "shard blobs found: $count"
          if [ "$count" -ne 3 ]; then
            echo "Expected 3 shard coverage blobs, found $count — failing closed (partial coverage must not pass the gate)."
            exit 1
          fi

      - name: Merge coverage + enforce t-17 thresholds on the MERGED suite
        id: merge
        # No --reporter=blob here: vitest errors "Cannot merge reports when
        # --reporter=blob is used". The config thresholds (80/80/70/80) apply to the
        # merged coverage map — this is the one and only coverage gate.
        run: pnpm --filter @memex/server exec vitest --merge-reports --coverage run

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: packages/server/coverage/
          retention-days: 14

      # spec-276: self-report the runtime-only AC from the live run — the structural
      # regression test asserts the workflow INVOKES the merge gate, but only the
      # real run proves the threshold fired on merged coverage. Mirrors how
      # e2e-result emits spec-172 ac-1: pass AND fail alike, non-blocking (|| true),
      # skipped silently when no key is configured.
      - name: Emit spec-276 ac-3 (threshold enforced on merged coverage)
        if: always()
        run: |
          STATUS=$([ "${{ steps.merge.outcome }}" = "success" ] && echo pass || echo fail)
          if [ -z "$MEMEX_EMIT_KEY" ]; then
            echo "MEMEX_EMIT_KEY unset — skipping ac-3 emission (status would be: $STATUS)"
          else
            curl -sS -X POST "https://memex.ai/api/test-events" \
              -H "Authorization: Bearer $MEMEX_EMIT_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"ac_uid\":\"mindset-prod/memex-building-itself/specs/spec-276/acs/ac-3\",\"status\":\"$STATUS\",\"test_identifier\":\".github/workflows/test.yml::server-result\",\"actor\":\"${{ github.actor }}\",\"metadata\":{\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"run_id\":\"${{ github.run_id }}\"}}" \
              && echo "ac-3 emitted: $STATUS" || echo "ac-3 emission failed (non-blocking)"
          fi

  # Production build gate (std-17 §6 / cl-55): `make build` is what the deploy
  # actually runs, and vitest does NOT typecheck — a green test matrix can hide
  # a TS2741 that splits the deploy (exactly how PR #44's AcPill gap shipped:
  # every per-PR job passed, then both develop deploys went red at `tsc -b`).
  # Running `pnpm build` (= make build) per PR moves that failure from the
  # deploy tail to the merge gate.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Production build (tsc + vite) — the same gate the deploy runs
        run: pnpm build

  # React UI unit tests (jsdom) + coverage gate. No database.
  ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # the root package.json `packageManager` field and errors if both are set.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: UI unit tests + coverage gate
        run: pnpm --filter @memex/ui test:coverage
      - name: Upload UI coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-coverage
          path: packages/ui/coverage/
          retention-days: 14

  # memex-ai is a zero-dep package; vitest is a dev dep of the cli workspace.
  # Fast, no database.
  cli:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # the root package.json `packageManager` field and errors if both are set.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: CLI installer tests
        run: pnpm --filter memex-ai test

  # UI E2E (Playwright). Runs against a freshly migrated DB via the webServer block
  # in playwright.config.ts — the same setup a developer uses locally.
  #
  # Per-PR again: spec-172 REBUILT this tier against the post-0038 product —
  # deleted the six account-era journeys, replaced the dropped-table SQL seeding
  # with service-backed test-only endpoints (/api/__test__), added a cold-DB
  # globalSetup, and re-based the retained journeys + authored fresh tenancy and
  # lifecycle-spine journeys. The suite now goes green on a cold, freshly-migrated
  # database, so the schedule/workflow_dispatch gate is removed and e2e is a
  # per-PR job again (the merge-side counterpart of the std-17 smoke tier).
  #
  # The suite runs serially (workers: 1 — tests share the dev user + DB), so
  # wall-clock is cut by SHARDING across jobs instead: each shard gets its own
  # Postgres service and runs 1/N of the files. Branch protection should require
  # the single `e2e-result` aggregator below, NOT the matrix legs (their check
  # names — "e2e (1)" etc. — change with the shard count). Flipping that required
  # check on develop + main is a repo-settings action for the owner, not this file.
  e2e:
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        # pgvector-bundled Postgres 16 — migration 0023 (codebase intelligence)
        # runs CREATE EXTENSION vector, absent from the stock postgres image.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memex
      # spec-129: authenticate AC-emission to the prod Memex. Value lives in the
      # MEMEX_EMIT_KEY repo secret (Settings → Secrets and variables → Actions),
      # never in this file; empty until set (harmless pre-enforcement), and what
      # greens the spec-129 ac-5 gate once configured.
      MEMEX_EMIT_KEY: ${{ secrets.MEMEX_EMIT_KEY }}
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memex
      # The Playwright webServer boots the REAL server, which refuses to start
      # without KMS_KEY_NAME unless this dev escape hatch is set (see
      # services/.ee/slack/crypto.ts). Locally it leaks in from
      # packages/server/.env; CI has no .env, so set it explicitly.
      SLACK_TOKEN_ENCRYPTION: plaintext
      # Journey 8 + 9 drive a deterministic Anthropic double via /api/__test__/anthropic-queue.
      # See packages/server/src/agent/anthropic-fake.ts. playwright.config.ts sets this on
      # the webServer block too; duplicating it here covers the case where CI reuses a pre-
      # started process.
      MEMEX_ANTHROPIC_FAKE: "1"

    steps:
      - uses: actions/checkout@v6
      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # the root package.json `packageManager` field and errors if both are set.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: |
          for f in packages/server/drizzle/*.sql; do psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"; done
      # Cache the Chromium binary (~150MB download) keyed on the lockfile — the
      # Playwright version is pinned there, so a version bump busts the cache.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @memex/ui exec playwright install --with-deps chromium
      - name: Install Playwright OS deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @memex/ui exec playwright install-deps chromium
      - name: E2E journeys (shard ${{ matrix.shard }}/3)
        run: pnpm --filter @memex/ui test:e2e --shard=${{ matrix.shard }}/3
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: packages/ui/test-results/
          retention-days: 7

  # The single stable check name for branch protection (matrix leg names shift
  # with the shard count). Green only when every e2e shard is green.
  e2e-result:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      MEMEX_EMIT_KEY: ${{ secrets.MEMEX_EMIT_KEY }}
    steps:
      # spec-172 ac-1 self-reports from here: this aggregator IS the "full
      # Playwright suite passed against a cold, freshly-migrated DB" signal,
      # so it emits the AC's test event — pass AND fail alike, per the
      # ac-emission discipline — to the canonical Memex. A missing key or a
      # failed POST never flips the check itself (`|| true`), matching the
      # vitest helper's warn-and-move-on semantics.
      - name: Emit spec-172 ac-1 (full e2e suite cold)
        run: |
          STATUS=$([ "${{ needs.e2e.result }}" = "success" ] && echo pass || echo fail)
          if [ -z "$MEMEX_EMIT_KEY" ]; then
            echo "MEMEX_EMIT_KEY unset — skipping ac-1 emission (status would be: $STATUS)"
          else
            curl -sS -X POST "https://memex.ai/api/test-events" \
              -H "Authorization: Bearer $MEMEX_EMIT_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"ac_uid\":\"mindset-prod/memex-building-itself/specs/spec-172/acs/ac-1\",\"status\":\"$STATUS\",\"test_identifier\":\".github/workflows/test.yml::e2e-result\",\"actor\":\"${{ github.actor }}\",\"metadata\":{\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\",\"run_id\":\"${{ github.run_id }}\"}}" \
              && echo "ac-1 emitted: $STATUS" || echo "ac-1 emission failed (non-blocking)"
          fi
      - name: All e2e shards green?
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "e2e shards result: ${{ needs.e2e.result }}"
            exit 1
          fi
          echo "All e2e shards passed."

  # Separate job (not part of the PR gate) — runs the slow perf suite nightly and on
  # demand. Kept out of the per-PR path so reviewers aren't waiting on 20s of concurrent
  # signup tests for unrelated changes.
  perf:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        # pgvector-bundled Postgres 16 — migration 0023 (codebase intelligence)
        # runs CREATE EXTENSION vector, absent from the stock postgres image.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/memex
      # spec-129: authenticate AC-emission to the prod Memex. Value lives in the
      # MEMEX_EMIT_KEY repo secret (Settings → Secrets and variables → Actions),
      # never in this file; empty until set (harmless pre-enforcement), and what
      # greens the spec-129 ac-5 gate once configured.
      MEMEX_EMIT_KEY: ${{ secrets.MEMEX_EMIT_KEY }}

    steps:
      - uses: actions/checkout@v6
      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # the root package.json `packageManager` field and errors if both are set.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: |
          for f in packages/server/drizzle/*.sql; do psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"; done
      - name: Performance tests
        run: pnpm --filter @memex/server test:perf
